name: Deploy to HuggingFace Space

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "jaloliddintemirov890@gmail.com"
          git config user.name "jalols890"
          cp README_HF.md README.md
          git add README.md
          git commit -m "chore: update HF Space README" --allow-empty
          git remote add space https://jalols890:$HF_TOKEN@huggingface.co/spaces/jalols890/pm25-tashkent
          git push space main --force
